name = "japan-seasons-api"
main = "src/index.ts"
compatibility_date = "2025-03-28"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

# Custom domain
routes = [
  { pattern = "jpseasons.dokos.dev", custom_domain = true }
]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "japan-seasons-db"
database_id = "8d349a78-3837-4ce2-83d7-d2ab1f07638c"

# KV Namespace for caching
[[kv_namespaces]]
binding = "KV"
id = "23670483d21a463e87ba86253b9f26d9"

# Cron Triggers - daily during sakura season
[triggers]
crons = ["0 1 * * *"]

# Environment variables
[vars]
ENVIRONMENT = "production"
# Set these via `wrangler secret put`:
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# JWT_SECRET

# Staging environment
[env.staging]
name = "japan-seasons-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

# Local development
[env.dev]
name = "japan-seasons-api-dev"
[env.dev.vars]
ENVIRONMENT = "development"
